name: Release Cards DB

on:
  push:
    tags:
      - 'cards-db-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. cards-db-v1.1.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Build card database
        env:
          KARN_DATA_DIR: ${{ github.workspace }}/db
        run: python scripts/build_db.py
        timeout-minutes: 60

      - name: Package cards DB
        env:
          DB_DIR: ${{ github.workspace }}/db
          REF_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          version="${REF_NAME#cards-db-v}"
          asset="karn-cards-db-v${version}.tar.gz"
          tar -czf "${asset}" -C "${DB_DIR}" chroma_db graph.json prints.db
          echo "ASSET_NAME=${asset}" >> "$GITHUB_ENV"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: ${{ env.ASSET_NAME }}
          generate_release_notes: false
